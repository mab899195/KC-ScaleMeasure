<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scale — Blueprint Measure</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0b;--panel:#141417;--border:#222226;--muted:#6b6b73;
  --text:#ededf0;--accent:#5b8def;--accent2:#7c5cff;--ok:#4ade80;--warn:#fb7185;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;letter-spacing:-.01em;display:flex;flex-direction:column}

#top{height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;background:var(--panel);border-bottom:1px solid var(--border);z-index:10}
.logo{font-weight:600;font-size:14px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.logo .dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 12px var(--accent)}
.sep{width:1px;height:24px;background:var(--border);margin:0 4px}
.grow{flex:1}

.btn{appearance:none;background:transparent;border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s ease;font-family:inherit}
.btn:hover{background:#1d1d22;border-color:#2c2c33}
.btn:disabled{cursor:not-allowed}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#4a7ce0;border-color:#4a7ce0}
.btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 0 0 1px rgba(91,141,239,.4),0 4px 14px rgba(91,141,239,.25)}
.btn.ghost{border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--text);background:#1d1d22}
.btn svg{width:14px;height:14px}

#f{display:none}
.file-label{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border:1px dashed #2c2c33;border-radius:8px;cursor:pointer;font-size:12.5px;color:var(--muted);transition:all .15s}
.file-label:hover{color:var(--text);border-color:var(--accent);background:rgba(91,141,239,.06)}
.file-label.loaded{color:var(--ok);border-color:rgba(74,222,128,.3);border-style:solid;background:rgba(74,222,128,.05)}

.mode-group{display:flex;background:#0a0a0b;border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px}
.mode-group .btn{border:none;padding:6px 10px;font-size:12px;border-radius:6px}
.mode-group .btn:not(.active):hover{background:#1d1d22}

#stage{flex:1;position:relative;overflow:auto;background:
  radial-gradient(circle at 1px 1px,#1a1a1f 1px,transparent 0) 0 0/24px 24px,
  var(--bg)}
#wrap{min-width:100%;min-height:100%;display:flex;align-items:center;justify-content:center;padding:32px}
#cv{display:block;background:#fff;cursor:crosshair;border-radius:6px;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px var(--border);transform-origin:top left}
#cv.empty{display:none}

#zoom{position:fixed;bottom:20px;left:20px;display:flex;background:rgba(20,20,23,.85);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--border);border-radius:10px;padding:4px;gap:2px;box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:5}
#zoom .btn{border:none;padding:6px 9px;border-radius:7px;color:var(--muted)}
#zoom .btn:hover{background:#1d1d22;color:var(--text)}
#zoom .zl{display:flex;align-items:center;justify-content:center;min-width:54px;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text);padding:0 6px;cursor:pointer;border-radius:7px}
#zoom .zl:hover{background:#1d1d22}

#empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);pointer-events:none}
#empty svg{width:48px;height:48px;opacity:.4}
#empty h2{font-size:15px;font-weight:500;color:var(--text);letter-spacing:-.01em}
#empty p{font-size:12.5px}

#hud{position:fixed;top:68px;right:16px;background:rgba(20,20,23,.85);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--border);border-radius:12px;padding:14px 16px;min-width:220px;box-shadow:0 10px 40px rgba(0,0,0,.4);z-index:5}
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px}
.row .lbl{color:var(--muted);text-transform:uppercase;font-size:10.5px;letter-spacing:.08em;font-weight:500}
.row .val{font-weight:600;font-variant-numeric:tabular-nums}
.row + .row{border-top:1px solid var(--border)}
.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.pill.idle{background:#1d1d22;color:var(--muted)}
.pill.cal{background:rgba(124,92,255,.15);color:#a99cff}
.pill.meas{background:rgba(91,141,239,.15);color:#8ab1ff}
.pill .blink{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

.total-block{margin-top:10px;padding:12px;background:linear-gradient(135deg,rgba(91,141,239,.08),rgba(124,92,255,.08));border:1px solid rgba(91,141,239,.2);border-radius:9px}
.total-block .lbl{color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:.1em;font-weight:500;margin-bottom:4px}
.total-block .big{font-size:24px;font-weight:600;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.total-block .unit{font-size:13px;color:var(--muted);margin-left:4px;font-weight:400}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,20,23,.95);backdrop-filter:blur(20px);border:1px solid var(--border);padding:10px 16px;border-radius:10px;font-size:12.5px;opacity:0;transition:all .25s;pointer-events:none;z-index:20}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:50}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;width:340px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal h3{font-size:14px;font-weight:600;margin-bottom:4px}
.modal p{font-size:12px;color:var(--muted);margin-bottom:14px}
.modal input{width:100%;background:#0a0a0b;border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.modal input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}

::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2c2c33;border-radius:10px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#3c3c45}

#pcur{appearance:none;background:transparent;border:none;outline:none;color:inherit;font:inherit;font-variant-numeric:tabular-nums;text-align:center;padding:2px 4px;border-radius:5px;width:2ch;cursor:pointer;font-family:inherit}
#pcur:hover{background:#1d1d22}
#pcur:focus{background:#0a0a0b;outline:1px solid var(--accent);cursor:text}
</style>
</head>
<body>

<div id="top">
  <div class="logo"><span class="dot"></span>Scale</div>
  <div class="sep"></div>
  <label class="file-label" id="fl" for="f">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
    <span id="fname">Upload PDF</span>
  </label>
  <input type="file" id="f" accept="application/pdf">

  <div class="sep"></div>

  <div class="mode-group">
    <button class="btn" id="bc">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 6-6"/></svg>
      Calibrate
    </button>
    <button class="btn" id="bm">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 6H3M21 12H3M21 18H3"/></svg>
      Measure
    </button>
  </div>

  <div class="sep" id="psep" style="display:none"></div>
  <div class="mode-group" id="pager" style="display:none">
    <button class="btn" id="pprev" title="Previous page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div style="display:flex;align-items:center;min-width:64px;justify-content:center;font-size:12px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums"><input id="pcur" type="text" inputmode="numeric" value="1">&nbsp;/&nbsp;<span id="ptot">1</span></div>
    <button class="btn" id="pnext" title="Next page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <div class="grow"></div>
  <button class="btn ghost" id="br">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
    Reset
  </button>
</div>

<div id="stage">
  <div id="empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>
    <h2>Load a blueprint to begin</h2>
    <p>Drop a PDF or click "Upload PDF" above</p>
  </div>
  <div id="wrap"><canvas id="cv" class="empty"></canvas></div>
</div>

<div id="zoom">
  <button class="btn" id="zout" title="Zoom out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M5 12h14"/></svg></button>
  <div class="zl" id="zlabel" title="Reset to 100%">100%</div>
  <button class="btn" id="zin" title="Zoom in"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 5v14M5 12h14"/></svg></button>
  <div style="width:1px;background:var(--border);margin:4px 2px"></div>
  <button class="btn" id="zfit" title="Fit to page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4"/></svg></button>
</div>

<div id="hud">
  <div class="row"><span class="lbl">Status</span><span class="pill idle" id="pill">Idle</span></div>
  <div class="row"><span class="lbl">Scale</span><span class="val" id="sc">—</span></div>
  <div class="row"><span class="lbl">Points</span><span class="val" id="pc">0</span></div>
  <div class="total-block">
    <div class="lbl">Total Distance</div>
    <div><span class="big" id="tt">0.00</span><span class="unit">ft</span></div>
  </div>
</div>

<div id="toast"></div>

<div class="modal-bg" id="mbg">
  <div class="modal">
    <h3>Set Real-World Distance</h3>
    <p>Enter the actual distance between the two points you clicked.</p>
    <input type="number" id="mi" placeholder="e.g. 10" step="0.01" autofocus>
    <div class="modal-actions">
      <button class="btn" id="mcancel">Cancel</button>
      <button class="btn primary" id="mok">Confirm</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const cv = $('cv'), ctx = cv.getContext('2d');
let mode='', calPts=[], bg=null, pdfDoc=null, curPage=1, pageData={}, zoom=1;
const cur = () => pageData[curPage] ||= { ppf:0, measPts:[], total:0 };
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

const toast = msg => {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), 2200);
};

const updatePill = () => {
  const p = $('pill');
  p.className = 'pill ' + (mode==='calibrate'?'cal':mode==='measure'?'meas':'idle');
  p.innerHTML = mode ? `<span class="blink"></span>${mode==='calibrate'?'Calibrating':'Measuring'}` : 'Idle';
};

const updateHUD = () => {
  const d = cur();
  $('sc').textContent = d.ppf ? d.ppf.toFixed(1)+' px/ft' : '—';
  $('tt').textContent = d.total.toFixed(2);
  $('pc').textContent = d.measPts.length;
  updatePill();
};

const setMode = m => {
  mode = m;
  $('bc').classList.toggle('active', m==='calibrate');
  $('bm').classList.toggle('active', m==='measure');
  const d = cur();
  calPts=[]; d.measPts=[]; d.total=0;
  updateHUD();
  redraw();
};

$('bc').onclick = () => setMode(mode==='calibrate'?'':'calibrate');
$('bm').onclick = () => {
  if(!cur().ppf){ toast('Please calibrate first'); return; }
  setMode(mode==='measure'?'':'measure');
};
$('br').onclick = () => { pageData = {}; setMode(''); toast('Reset complete'); };

const applyZoom = () => {
  cv.style.transform = `scale(${zoom})`;
  cv.style.marginRight = (cv.width * (zoom-1)) + 'px';
  cv.style.marginBottom = (cv.height * (zoom-1)) + 'px';
  $('zlabel').textContent = Math.round(zoom*100)+'%';
};
const setZoom = z => { zoom = Math.max(0.1, Math.min(8, z)); applyZoom(); };
$('zin').onclick = () => setZoom(zoom * 1.25);
$('zout').onclick = () => setZoom(zoom / 1.25);
$('zlabel').onclick = () => setZoom(1);
$('zfit').onclick = () => {
  if(!cv.width) return;
  const s = $('stage'), pad = 64;
  setZoom(Math.min((s.clientWidth-pad)/cv.width, (s.clientHeight-pad)/cv.height));
};
$('stage').addEventListener('wheel', e => {
  if(!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  setZoom(zoom * (e.deltaY < 0 ? 1.1 : 1/1.1));
}, {passive:false});

const renderPage = async n => {
  const page = await pdfDoc.getPage(n);
  const vp = page.getViewport({scale:2});
  cv.width = vp.width; cv.height = vp.height;
  await page.render({canvasContext:ctx, viewport:vp}).promise;
  bg = ctx.getImageData(0,0,cv.width,cv.height);
  curPage = n;
  $('pcur').textContent = n;
  $('pprev').disabled = n<=1;
  $('pnext').disabled = n>=pdfDoc.numPages;
  $('pprev').style.opacity = n<=1 ? .4 : 1;
  $('pnext').style.opacity = n>=pdfDoc.numPages ? .4 : 1;
  calPts=[];
  applyZoom();
  updateHUD();
  redraw();
};

$('pprev').onclick = () => { if(curPage>1) renderPage(curPage-1); };
$('pnext').onclick = () => { if(curPage<pdfDoc.numPages) renderPage(curPage+1); };

$('f').onchange = async e => {
  const file = e.target.files[0]; if(!file) return;
  $('fname').textContent = file.name.length>22 ? file.name.slice(0,20)+'…' : file.name;
  $('fl').classList.add('loaded');
  const buf = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({data:buf}).promise;
  pageData = {};
  $('ptot').textContent = pdfDoc.numPages;
  const showPager = pdfDoc.numPages > 1;
  $('pager').style.display = showPager ? '' : 'none';
  $('psep').style.display = showPager ? '' : 'none';
  await renderPage(1);
  cv.classList.remove('empty');
  $('empty').style.display = 'none';
  toast(pdfDoc.numPages>1 ? `Loaded ${pdfDoc.numPages} pages — calibrate to begin` : 'PDF loaded — calibrate to begin');
};

const drawPoly = (pts, color) => {
  if(!pts.length) return;
  ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.shadowColor = color; ctx.shadowBlur = 8;
  ctx.beginPath();
  pts.forEach((p,i)=> i ? ctx.lineTo(p.x,p.y) : ctx.moveTo(p.x,p.y));
  ctx.stroke();
  ctx.shadowBlur = 0;
  pts.forEach(p => {
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(p.x,p.y,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = color; ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill();
  });
};

const redraw = () => {
  if(bg) ctx.putImageData(bg,0,0); else ctx.clearRect(0,0,cv.width,cv.height);
  drawPoly(calPts, '#7c5cff');
  drawPoly(cur().measPts, '#5b8def');
};

const dist = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);

const askDistance = () => new Promise(resolve => {
  const m = $('mbg'), input = $('mi');
  m.classList.add('show'); input.value=''; setTimeout(()=>input.focus(), 50);
  const close = v => { m.classList.remove('show'); resolve(v); };
  $('mok').onclick = () => close(parseFloat(input.value));
  $('mcancel').onclick = () => close(null);
  input.onkeydown = e => { if(e.key==='Enter') close(parseFloat(input.value)); if(e.key==='Escape') close(null); };
});

cv.onclick = async e => {
  if(!mode) return;
  const r = cv.getBoundingClientRect();
  const p = { x:(e.clientX-r.left)*(cv.width/r.width), y:(e.clientY-r.top)*(cv.height/r.height) };
  const d = cur();

  if(mode==='calibrate'){
    calPts.push(p); redraw();
    if(calPts.length===2){
      const ft = await askDistance();
      if(ft>0){
        d.ppf = dist(calPts[0],calPts[1]) / ft;
        updateHUD();
        toast('Calibrated — switch to Measure mode');
      }
      calPts=[]; redraw();
    }
  } else if(mode==='measure'){
    if(d.measPts.length) d.total += dist(d.measPts[d.measPts.length-1], p) / d.ppf;
    d.measPts.push(p);
    updateHUD();
    redraw();
  }
};

// Pan: hold space, middle-click, or right-click drag
const stage = $('stage');
let panning=false, spaceDown=false, sx=0, sy=0, ssl=0, sst=0;
const startPan = e => { panning=true; sx=e.clientX; sy=e.clientY; ssl=stage.scrollLeft; sst=stage.scrollTop; stage.style.cursor='grabbing'; e.preventDefault(); };
const onMove = e => { if(!panning) return; stage.scrollLeft = ssl - (e.clientX - sx); stage.scrollTop = sst - (e.clientY - sy); };
const endPan = () => { panning=false; stage.style.cursor = spaceDown?'grab':''; };
stage.addEventListener('mousedown', e => { if(e.button===1 || e.button===2 || (e.button===0 && spaceDown)) startPan(e); });
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', endPan);
stage.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space' && !spaceDown){ spaceDown=true; stage.style.cursor='grab'; cv.style.pointerEvents='none'; e.preventDefault(); }
  else if(e.key==='ArrowLeft' && pdfDoc && curPage>1) renderPage(curPage-1);
  else if(e.key==='ArrowRight' && pdfDoc && curPage<pdfDoc.numPages) renderPage(curPage+1);
});
window.addEventListener('keyup', e => {
  if(e.code==='Space'){ spaceDown=false; stage.style.cursor=''; cv.style.pointerEvents=''; }
});

// Drag & drop
document.addEventListener('dragover', e=>e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if(file && file.type==='application/pdf'){
    $('f').files = e.dataTransfer.files;
    $('f').dispatchEvent(new Event('change'));
  }
});
</script>
</body>
</html>
